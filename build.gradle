buildscript {
    repositories { mavenCentral() }
    dependencies {
        classpath 'io.github.cdimascio:dotenv-java:3.2.0'
    }
}
plugins {
    id 'java'
    id 'application'
    id 'com.gradleup.shadow' version '9.3.2'
    id 'org.hidetake.ssh' version '2.12.0'
}
apply from: 'gradle/jdaEventEnumCodeGen.gradle'

import io.github.cdimascio.dotenv.Dotenv

group = 'dev.jojofr'
version = '2.1.1'

def dotenv = Dotenv.configure()
        .directory(project.rootDir.absolutePath)
        .ignoreIfMissing()
        .load()

java.toolchain.languageVersion = JavaLanguageVersion.of(21)
application.mainClass = 'dev.jojofr.joseta.JosetaBot'

def generatedSourcesDir = layout.buildDirectory.dir("generated/sources/annotationProcessor/java/main")
sourceSets.main.java.srcDir generatedSourcesDir

repositories { mavenCentral() }
dependencies {
    implementation('net.dv8tion:JDA:6.3.1') {
        // Optionally disable audio natives to reduce jar size by excluding `opus-java` and `tink`
        exclude module: 'opus-java'
        exclude module: 'tink'
    }
    implementation 'ch.qos.logback:logback-classic:1.5.32'
    implementation 'io.github.cdimascio:dotenv-java:3.2.0'
    implementation 'org.reflections:reflections:0.10.2'

    implementation 'org.postgresql:postgresql:42.7.10'
    implementation 'org.hibernate.orm:hibernate-core:7.2.6.Final'

    annotationProcessor 'org.hibernate.orm:hibernate-processor:7.2.6.Final'
    implementation 'org.hibernate.orm:hibernate-hikaricp:7.2.6.Final'
    implementation 'com.zaxxer:HikariCP:7.0.2'
}

tasks.withType(JavaCompile).configureEach {
    dependsOn tasks.named('generateJdaEventEnum')

    options.encoding = 'UTF-8'
    options.incremental = true
    options.compilerArgs << '-parameters' // Enable parameter name retention at runtime, required for the InteractionProcessor

    options.getGeneratedSourceOutputDirectory().set(file(generatedSourcesDir))
}

shadowJar {
    archiveFileName = 'JosetaBot.jar'
}

run {
    classpath = sourceSets.main.runtimeClasspath
    args = [ '--debug' ]
}

tasks.register('runDebug', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = application.mainClass

    jvmArgs = [ '-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005' ]
    args    = [ '--debug' ]
}

remotes {
    remoteServer {
        host     = dotenv.get('REMOTE_HOST')
        user     = dotenv.get('REMOTE_USER')
        identity = dotenv.get('REMOTE_KEY_PATH') ? file(dotenv.get('REMOTE_KEY_PATH')?.replace('~', System.getProperty('user.home'))) : null
        port     = dotenv.get('REMOTE_PORT')?.toInteger() ?: 22
    }
}

tasks.register('uploadServer') {
    dependsOn shadowJar
    inputs.file shadowJar.archiveFile

    doLast {
        def jarFile = shadowJar.archiveFile.get().asFile
        println "Uploading ${jarFile} to remote server..."
        ssh.run {
            session(remotes.remoteServer) {
                put from: jarFile, into: '.'
            }
        }
        println 'Upload complete.'
    }
}
